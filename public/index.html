<!DOCTYPE html>
<html lang="vi" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Tiến độ & Cấu trúc Phân hệ Chương trình Đào tạo</title>

  <!-- Firebase Config Script (local file CORS bypass) -->
  <script src="firebase_config.js"></script>
  <script src="sql_tables_schema.js"></script>

  <!-- Quill CSS & JS (Rich Text Editor) -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Modular Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- MOBILE SIDEBAR OVERLAY -->
  <div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileSidebar()"></div>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" title="Mở danh mục menu">
        <svg viewBox="0 0 24 24">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
        </svg>
      </button>
      <div class="logo-badge">ASC</div>
      <div class="header-title-container">
        <h1>Quản lý Tiến độ & Phân hệ</h1>
        <p>Hệ thống Chương trình Đào tạo v2.0</p>
      </div>

      <!-- MODULE SELECTOR DROPDOWN -->
      <div class="module-selector-container">
        <select id="module-select" onchange="switchModule(this.value)">
          <!-- Rendered dynamically -->
        </select>
      </div>
    </div>

    <div class="header-right">
      <!-- CLOUD SYNC STATUS BADGE -->
      <div class="cloud-status-badge offline" id="cloud-status-badge" title="Khởi tạo...">
        <div class="status-dot"></div>
        <span class="status-text">Local Sync</span>
      </div>

      <button class="btn" id="lock-toggle-btn" onclick="toggleLockMode()" style="display: flex;">
        <!-- Rendered dynamically -->
      </button>

      <a href="db_diagram.html" target="_blank" class="btn btn-view-diagram" id="db-diagram-btn"
        title="Xem sơ đồ quan hệ Database (ERD)">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <path
            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z" />
        </svg>
        <span class="btn-text-label">Sơ đồ DB</span>
      </a>



      <button class="btn" id="export-btn" title="Xuất dữ liệu tiến độ ra file JSON">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
        </svg>
        <span class="btn-text-label">Export JSON</span>
      </button>

      <button class="btn" id="import-btn" title="Nhập dữ liệu tiến độ từ file JSON" style="display: none;">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z" />
        </svg>
        <span class="btn-text-label">Import JSON</span>
      </button>
      <input type="file" id="import-file-input" accept=".json">

      <button class="btn" id="reset-btn" title="Reset dữ liệu tiến độ về mặc định" style="display: none;">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <path
            d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" />
        </svg>
      </button>
      <button class="btn" id="admin-settings-btn" onclick="openAdminSettings()" title="Cấu hình hệ thống"
        style="display: none;">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <path
            d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z" />
        </svg>
      </button>
      <button class="btn theme-toggle-btn" id="theme-btn" title="Đổi giao diện Sáng/Tối">
        <svg class="icon-svg dark-icon" viewBox="0 0 24 24" style="display:none;">
          <path
            d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z" />
        </svg>
        <svg class="icon-svg light-icon" viewBox="0 0 24 24">
          <path
            d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- WORKSPACE CONTAINER -->
  <div class="workspace">

    <!-- LEFT SIDEBAR -->
    <aside>

      <!-- OVERALL PROGRESS PANEL -->
      <div class="progress-panel">
        <div class="progress-header">
          <h3>Tổng tiến độ</h3>
          <div class="progress-pct" id="global-progress-pct">0%</div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="global-progress-bar"></div>
        </div>

        <div
          style="margin-top: 10px; margin-bottom: 12px; padding-top: 8px; border-top: 1px dashed var(--card-border);">
          <div
            style="display:flex; justify-content:space-between; align-items:center; font-size:11px; font-weight:600; margin-bottom:4px;">
            <span style="color:var(--text-muted);">Tiến độ theo độ khó:</span>
            <span id="global-weighted-progress-pct" style="color:var(--accent-color); font-weight:700;">0% (0/0đ)</span>
          </div>
          <div class="progress-bar-container" style="height:6px; margin-bottom:0;">
            <div class="progress-bar-fill" id="global-weighted-progress-bar"
              style="background: linear-gradient(90deg, #10b981 0%, #059669 100%); width:0%;"></div>
          </div>
        </div>

        <div class="progress-stats-grid">
          <div class="stat-box">
            <span class="stat-num" id="stat-total">0</span>
            <span class="stat-label">Tổng số</span>
          </div>
          <div class="stat-box" style="color: var(--status-progress-text)">
            <span class="stat-num" id="stat-progress">0</span>
            <span class="stat-label">Đang làm</span>
          </div>
          <div class="stat-box" style="color: var(--status-done-text)">
            <span class="stat-num" id="stat-done">0</span>
            <span class="stat-label">Xong</span>
          </div>
        </div>

        <!-- THỐNG KÊ CHI TIẾT THEO ĐỘ KHÓ -->
        <div style="margin-top: 14px; padding-top: 10px; border-top: 1px dashed var(--card-border);">
          <button id="diff-stats-toggle" onclick="toggleDiffStats()"
            style="width:100%; display:flex; justify-content:space-between; align-items:center; background:none; border:none; cursor:pointer; padding:0; color:var(--text-muted); margin-bottom:0;">
            <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">Thống kê theo
              độ khó</span>
            <svg id="diff-stats-chevron"
              style="width:14px; height:14px; fill:currentColor; transform:rotate(0deg); transition:transform 0.2s ease; flex-shrink:0;"
              viewBox="0 0 24 24">
              <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
            </svg>
          </button>
          <div id="difficulty-stats-list" style="display:none; flex-direction:column; gap:4px; margin-top:8px;"></div>
        </div>
      </div>

      <!-- SEARCH -->
      <div>
        <div class="sidebar-section-title">Tìm kiếm màn hình</div>
        <div class="search-container">
          <input type="text" class="search-input" id="search-box" placeholder="Mã, tên màn hình, table...">
          <svg class="search-icon-svg" viewBox="0 0 24 24">
            <path
              d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
          </svg>
        </div>
      </div>

      <!-- FILTER STATUS -->
      <div>
        <button onclick="toggleSidebarSection('status-filter-container', 'chevron-status')"
          style="width:100%; display:flex; justify-content:space-between; align-items:center; background:none; border:none; cursor:pointer; padding:0 0 10px 0; color:var(--text-muted);">
          <span class="sidebar-section-title" style="margin-bottom:0;">Lọc theo trạng thái</span>
          <svg id="chevron-status"
            style="width:13px; height:13px; fill:currentColor; transform:rotate(180deg); transition:transform 0.2s ease; flex-shrink:0;"
            viewBox="0 0 24 24">
            <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
          </svg>
        </button>
        <div id="status-filter-container" class="filter-chips" style="display:flex;">
          <!-- Rendered dynamically -->
        </div>
      </div>

      <!-- FILTER DIFFICULTY -->
      <div>
        <button onclick="toggleSidebarSection('difficulty-filter-container', 'chevron-difficulty')"
          style="width:100%; display:flex; justify-content:space-between; align-items:center; background:none; border:none; cursor:pointer; padding:0 0 10px 0; color:var(--text-muted);">
          <span class="sidebar-section-title" style="margin-bottom:0;">Lọc theo độ khó</span>
          <svg id="chevron-difficulty"
            style="width:13px; height:13px; fill:currentColor; transform:rotate(180deg); transition:transform 0.2s ease; flex-shrink:0;"
            viewBox="0 0 24 24">
            <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
          </svg>
        </button>
        <div id="difficulty-filter-container" class="filter-chips" style="display:flex;">
          <!-- Rendered dynamically -->
        </div>
      </div>

    </aside>

    <!-- MAIN WORKSPACE -->
    <main>

      <div class="main-header">
        <div class="header-title-container">
          <h2 style="font-family: 'Outfit', sans-serif; font-size: 20px;" id="view-title">Cây chương trình đào tạo</h2>
        </div>

        <div class="view-mode-selector">
          <button class="view-mode-btn active" id="view-mode-tree">
            <svg class="icon-svg" viewBox="0 0 24 24">
              <path
                d="M22 11V3h-7v3H9V3H2v8h7V8h2v10H9v-3H2v8h7v-3h2v3h7v-8h-7v3h-2V8h2v3h7zM7 9H4V5h3v4zm0 10H4v-4h3v4zm13 0h-3v-4h3v4zm0-10h-3V5h3v4z" />
            </svg>
            Dạng cây (Tree)
          </button>
          <button class="view-mode-btn" id="view-mode-card">
            <svg class="icon-svg" viewBox="0 0 24 24">
              <path
                d="M4 14h6v-6H4v6zm0 7h6v-6H4v6zm7-13h6v-6h-6v6zm0 7h6v-6h-6v6zM4 4v3h6V4H4zm13 13h6v-6h-6v6zm0 4h6v-6h-6v6z" />
            </svg>
            Dạng lưới (Cards)
          </button>
        </div>
      </div>

      <!-- RENDER ZONE -->
      <div id="content-renderer">
        <!-- Render tree or card view dynamically -->
      </div>

    </main>

  </div>

  <!-- ADMIN SETTINGS MODAL -->
  <div class="admin-modal-overlay" id="admin-modal">
    <div class="admin-modal-card">
      <div class="admin-modal-header">
        <h3>⚙️ Cấu hình Hệ thống & Quản trị</h3>
        <button class="close-modal-btn" onclick="closeAdminSettings()">&times;</button>
      </div>
      <div class="admin-modal-body">
        <div class="admin-sidebar">
          <button class="admin-tab-btn active" id="tab-btn-modules" onclick="switchAdminTab('modules')">Quản lý Phân
            hệ</button>
          <button class="admin-tab-btn" id="tab-btn-screens" onclick="switchAdminTab('screens')">Quản lý Màn
            hình</button>
          <button class="admin-tab-btn" id="tab-btn-database" onclick="switchAdminTab('database')">Quản lý Table
            DB</button>
          <button class="admin-tab-btn" id="tab-btn-statuses" onclick="switchAdminTab('statuses')">Quản lý Trạng
            thái</button>
          <button class="admin-tab-btn" id="tab-btn-difficulties" onclick="switchAdminTab('difficulties')">Quản lý Độ
            khó</button>
        </div>
        <div class="admin-content-area" id="admin-tab-content">
          <!-- Loaded dynamically -->
        </div>
      </div>
    </div>
  </div>

  <!-- NOTE EDITOR MODAL -->
  <div class="admin-modal-overlay" id="note-editor-modal"
    style="display:none; align-items:center; justify-content:center; z-index:9999;">
    <div class="admin-modal-card" style="max-width:800px; width:95%; height:80vh; display:flex; flex-direction:column;">
      <div class="admin-modal-header" style="flex-shrink:0;">
        <h3 id="note-editor-title">📝 Xem chi tiết & Chỉnh sửa Ghi chú</h3>
        <button class="close-modal-btn" onclick="closeNoteEditorModal()">&times;</button>
      </div>
      <div class="admin-modal-body" style="flex:1; display:flex; flex-direction:column; padding:16px; overflow:hidden;">
        <!-- Quill Editor container -->
        <div id="note-quill-editor" style="flex:1; display:flex; flex-direction:column; overflow:hidden;"></div>
      </div>
      <div class="admin-modal-footer"
        style="padding:12px 16px; border-top:1px solid var(--card-border); display:flex; justify-content:flex-end; gap:12px; flex-shrink:0;">
        <button class="admin-btn secondary" onclick="closeNoteEditorModal()">Đóng</button>
        <button class="admin-btn primary" id="note-save-btn" onclick="saveNoteEditorContent()">Lưu thay đổi</button>
      </div>
    </div>
  </div>

  <!-- MODULAR APPLICATION SCRIPTS (STRICT EXECUTION ORDER) -->
  <script src="js/config.js"></script>
  <script src="js/firebase-service.js"></script>
  <script src="js/ui-render.js"></script>
  <script src="js/admin.js"></script>

  <script>
    // ENTRY POINT INITIALIZATION
    window.onload = () => {
      checkEditMode();
      loadLocalStatusConfigs();
      loadLocalDifficultyConfigs();
      fetchFirebaseConfig();

      // View mode events
      document.getElementById('view-mode-tree')?.addEventListener('click', () => {
        viewMode = 'tree';
        document.getElementById('view-mode-tree').classList.add('active');
        document.getElementById('view-mode-card').classList.remove('active');
        renderContent();
      });

      document.getElementById('view-mode-card')?.addEventListener('click', () => {
        viewMode = 'card';
        document.getElementById('view-mode-card').classList.add('active');
        document.getElementById('view-mode-tree').classList.remove('active');
        renderContent();
      });

      // Search event
      document.getElementById('search-box')?.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderContent();
      });

      // Export JSON
      document.getElementById('export-btn')?.addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(screensMap, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const downloadAnchor = document.createElement('a');
        downloadAnchor.href = url;
        downloadAnchor.download = "chuong_trinh_dao_tao_tien_do.json";
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        URL.revokeObjectURL(url);
      });

      // Import JSON
      const fileInput = document.getElementById('import-file-input');
      document.getElementById('import-btn')?.addEventListener('click', () => {
        fileInput.click();
      });

      fileInput?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (evt) {
          try {
            const imported = JSON.parse(evt.target.result);
            if (typeof imported === 'object' && imported !== null) {
              const keys = Object.keys(imported);
              if (keys.length > 0 && imported[keys[0]].id) {
                screensMap = imported;
                saveProgress();
                renderContent();
                alert("Nhập tiến độ thành công!");
              } else {
                alert("Định dạng file JSON không hợp lệ.");
              }
            }
          } catch (err) {
            alert("Lỗi khi đọc file JSON: " + err.message);
          }
        };
        reader.readAsText(file);
      });

      // Reset button
      document.getElementById('reset-btn')?.addEventListener('click', () => {
        if (confirm("Bạn có chắc chắn muốn reset toàn bộ tiến độ xử lý và ghi chú về mặc định không? Hành động này không thể hoàn tác.")) {
          localStorage.removeItem(STORAGE_KEY);
          initData();
          renderContent();
        }
      });

      // Theme toggle event
      const themeBtn = document.getElementById('theme-btn');
      themeBtn?.addEventListener('click', toggleTheme);
      const savedTheme = localStorage.getItem('menu_theme');
      const htmlEl = document.documentElement;
      const darkIcon = themeBtn?.querySelector('.dark-icon');
      const lightIcon = themeBtn?.querySelector('.light-icon');
      if (savedTheme === 'light') {
        htmlEl.classList.remove('dark');
        if (darkIcon) darkIcon.style.display = 'block';
        if (lightIcon) lightIcon.style.display = 'none';
      } else {
        htmlEl.classList.add('dark');
        if (darkIcon) darkIcon.style.display = 'none';
        if (lightIcon) lightIcon.style.display = 'block';
      }

      window.addEventListener('resize', () => {
        if (window.innerWidth > 768) {
          closeMobileSidebar();
        }
      });
    };
  </script>
</body>

</html>
