<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Tiến độ & Cấu trúc Phân hệ Chương trình Đào tạo</title>
  
  <!-- Firebase Config Script (local file CORS bypass) -->
  <script src="firebase_config.js"></script>
  <script src="sql_tables_schema.js"></script>
  
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* DESIGN SYSTEM & VARIABLES */
    :root {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --accent-color: #4f46e5;
      --accent-hover: #4338ca;
      --accent-light: #e0e7ff;
      --sidebar-bg: #ffffff;
      --sidebar-border: #e2e8f0;
      --item-hover: #f8fafc;
      
      --status-todo-bg: #f1f5f9;
      --status-todo-text: #475569;
      --status-todo-border: #cbd5e1;
      
      --status-progress-bg: #e0f2fe;
      --status-progress-text: #0284c7;
      --status-progress-border: #bae6fd;
      
      --status-done-bg: #dcfce7;
      --status-done-text: #15803d;
      --status-done-border: #86efac;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(226, 232, 240, 0.8);
      --scrollbar-thumb: #cbd5e1;
    }
    
    html.dark {
      --bg-gradient: radial-gradient(circle at top left, #0f172a 0%, #020617 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.06);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --accent-light: rgba(99, 102, 241, 0.15);
      --sidebar-bg: rgba(15, 23, 42, 0.9);
      --sidebar-border: rgba(255, 255, 255, 0.06);
      --item-hover: rgba(255, 255, 255, 0.03);
      
      --status-todo-bg: rgba(71, 85, 105, 0.2);
      --status-todo-text: #94a3b8;
      --status-todo-border: rgba(148, 163, 184, 0.3);
      
      --status-progress-bg: rgba(2, 132, 199, 0.15);
      --status-progress-text: #38bdf8;
      --status-progress-border: rgba(56, 189, 248, 0.3);
      
      --status-done-bg: rgba(21, 128, 61, 0.15);
      --status-done-text: #4ade80;
      --status-done-border: rgba(74, 222, 128, 0.3);
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.05);
      --scrollbar-thumb: #334155;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    /* SCROLLBAR STYLE */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 999px;
    }
    
    /* TOP HEADER BAR */
    header {
      height: 70px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--sidebar-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(8px);
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-badge {
      background: var(--accent-color);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
      letter-spacing: 0.5px;
    }
    
    .header-title-container h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    
    .header-title-container p {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 1px;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .btn {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
      transition: all 0.15s ease;
    }
    
    .btn:hover {
      background: var(--item-hover);
      transform: translateY(-1px);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .theme-toggle-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      justify-content: center;
      border-radius: 50%;
    }
    
    /* WORKSPACE BODY */
    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    
    /* SIDEBAR */
    aside {
      width: 320px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 24px 20px;
      gap: 24px;
    }
    
    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    
    .search-container {
      position: relative;
    }
    
    .search-input {
      width: 100%;
      background: var(--bg-gradient);
      border: 1px solid var(--card-border);
      padding: 10px 14px 10px 36px;
      font-size: 13px;
      border-radius: 8px;
      color: var(--text-main);
      outline: none;
    }
    
    .search-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px var(--accent-light);
    }
    
    .search-icon-svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      fill: var(--text-muted);
      pointer-events: none;
    }
    
    /* FILTER CHIPS */
    .filter-chips {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .filter-chip {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-main);
    }
    
    .filter-chip:hover {
      background: var(--item-hover);
    }
    
    .filter-chip.active {
      background: var(--accent-light);
      color: var(--accent-color);
      border-color: rgba(99, 102, 241, 0.2);
    }
    
    .chip-count {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.05);
    }
    html.dark .chip-count {
      background: rgba(255, 255, 255, 0.08);
    }
    
    /* PROGRESS BAR IN SIDEBAR */
    .progress-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    
    .progress-header h3 {
      font-size: 14px;
      font-weight: 600;
    }
    
    .progress-pct {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-color);
    }
    
    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: var(--bg-gradient);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid var(--card-border);
    }
    
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-color) 0%, #818cf8 100%);
      width: 0%;
      border-radius: 999px;
      transition: width 0.4s ease-out;
    }
    
    .progress-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      text-align: center;
    }
    
    .stat-box {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .stat-num {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
    }
    
    .stat-label {
      font-size: 9px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    
    /* MAIN PANEL */
    main {
      flex: 1;
      padding: 24px 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .view-mode-selector {
      display: flex;
      background: var(--sidebar-bg);
      border: 1px solid var(--card-border);
      padding: 3px;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
    }
    
    .view-mode-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .view-mode-btn.active {
      background: var(--accent-color);
      color: #ffffff;
      box-shadow: var(--shadow-sm);
    }
    
    /* TREE VIEW MODE */
    .tree-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .module-node {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    
    .module-header {
      padding: 16px 20px;
      background: var(--item-hover);
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    
    .module-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .module-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
    }
    
    .module-progress-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent-color);
    }
    
    .module-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    
    .group-node {
      border: 1px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
    }
    
    .group-header {
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.01);
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    html.dark .group-header {
      background: rgba(255, 255, 255, 0.01);
    }
    
    .group-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .group-body {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    /* LEAF / SCREEN NODE IN TREE */
    .screen-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    
    .screen-main-row {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      gap: 16px;
    }
    
    .screen-main-row:hover {
      background: var(--item-hover);
    }
    
    .screen-info-block {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    
    .screen-id-badge {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--bg-gradient);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      min-width: 65px;
      text-align: center;
    }
    
    .screen-title-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
    }
    
    .screen-edu-code {
      font-family: monospace;
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.03);
      padding: 2px 6px;
      border-radius: 4px;
    }
    html.dark .screen-edu-code {
      background: rgba(255, 255, 255, 0.05);
    }
    
    .screen-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    /* STATUS SELECT DROPDOWN */
    .status-select-container {
      position: relative;
    }
    
    .status-dropdown {
      padding: 4px 20px 4px 8px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23475569'%3e%3cpath d='M7 10l5 5 5-5H7z'/%3e%3c/svg%3e");
      background-position: right 4px center;
      background-repeat: no-repeat;
      background-size: 12px;
      transition: all 0.15s ease;
    }
    
    html.dark .status-dropdown {
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'%3e%3cpath d='M7 10l5 5 5-5H7z'/%3e%3c/svg%3e");
    }

    .status-dropdown option {
      background-color: var(--sidebar-bg);
      color: var(--text-main);
    }
    
    .status-dropdown.todo {
      background-color: var(--status-todo-bg);
      color: var(--status-todo-text);
      border-color: var(--status-todo-border);
    }
    
    .status-dropdown.progress {
      background-color: var(--status-progress-bg);
      color: var(--status-progress-text);
      border-color: var(--status-progress-border);
    }
    
    .status-dropdown.done {
      background-color: var(--status-done-bg);
      color: var(--status-done-text);
      border-color: var(--status-done-border);
    }
    
    .chevron-icon {
      width: 16px;
      height: 16px;
      fill: var(--text-muted);
      transition: transform 0.2s ease;
    }
    
    .expanded .chevron-icon {
      transform: rotate(90deg);
    }
    
    .rotated-180 {
      transform: rotate(180deg);
    }
    
    /* EXPANDED DETAILS PANEL */
    .screen-detail-panel {
      padding: 14px;
      background: var(--item-hover);
      border-top: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .details-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .details-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    
    .table-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .table-tag-link {
      font-family: monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-color);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 4px 8px;
      border-radius: 6px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.1s ease;
      box-shadow: var(--shadow-sm);
    }
    
    .table-tag-link:hover {
      border-color: var(--accent-color);
      background: var(--accent-light);
      transform: translateY(-1px);
    }
    
    .desc-textarea {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      color: var(--text-main);
      outline: none;
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }
    
    .desc-textarea:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px var(--accent-light);
    }
    
    .auto-save-indicator {
      align-self: flex-end;
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .auto-save-indicator.visible {
      opacity: 1;
    }
    
    /* CARD VIEW GRID MODE */
    .card-grid-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    
    .card-group-section h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--card-border);
      color: var(--text-main);
    }
    
    .grid-layout {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    
    .screen-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    
    .screen-card:hover {
      box-shadow: var(--shadow-md);
      border-color: rgba(99, 102, 241, 0.2);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.4;
    }
    
    /* SVG ICONS */
    .icon-svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    
    /* HIDDEN FILE INPUT FOR IMPORT */
    #import-file-input {
      display: none;
    }
    
    /* HELPERS */
    .hidden {
      display: none !important;
    }

    /* MODULE SELECTOR */
    .module-selector-container {
      margin-left: 20px;
      position: relative;
    }
    #module-select {
      background: var(--sidebar-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 8px 32px 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 14px;
      min-width: 220px;
      box-shadow: var(--shadow-sm);
      transition: all 0.15s ease;
    }
    #module-select:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px var(--accent-light);
    }

    /* CLOUD STATUS BADGE */
    .cloud-status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: var(--shadow-sm);
      border: 1px solid transparent;
    }

    .cloud-status-badge.offline {
      background: rgba(148, 163, 184, 0.12);
      color: var(--text-muted);
      border-color: var(--card-border);
    }
    .cloud-status-badge.offline .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .cloud-status-badge.connecting {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border-color: rgba(251, 191, 36, 0.2);
    }
    .cloud-status-badge.connecting .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1s infinite alternate;
    }

    .cloud-status-badge.connected {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border-color: rgba(52, 211, 153, 0.2);
    }
    .cloud-status-badge.connected .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
    }

    .cloud-status-badge.error {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border-color: rgba(248, 113, 113, 0.2);
    }
    .cloud-status-badge.error .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
    }

    /* TOAST NOTIFICATIONS */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 20000;
      pointer-events: none;
    }

    .toast {
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-lg);
      pointer-events: auto;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      max-width: 320px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
    }

    .toast.info {
      background: rgba(79, 70, 229, 0.9);
      color: #ffffff;
    }
    .toast.success {
      background: rgba(16, 185, 129, 0.9);
      color: #ffffff;
    }
    .toast.error {
      background: rgba(239, 68, 68, 0.9);
      color: #ffffff;
    }

    @keyframes slideIn {
      from { transform: translateY(12px) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes pulse {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    /* ADMIN SETTINGS MODAL */
    .admin-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .admin-modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .admin-modal-card {
      background: var(--sidebar-bg);
      border: 1px solid var(--card-border);

      height: 85vh;

      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(16px) scale(0.98);
      transition: transform 0.2s ease;

    .admin-modal-header {
      padding: 16px 24px;

    }
    .admin-modal-body {

    // INITIALIZE DATA
    function initData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          screensMap = JSON.parse(saved);
          
          INITIAL_SCREENS.forEach(sc => {
            if (!screensMap[sc.id]) {
              screensMap[sc.id] = {
                ...sc,
                description: '',
                status: 'Chưa xử lý'
              };
            } else {
              screensMap[sc.id].eduCode = sc.eduCode;
              screensMap[sc.id].tables = sc.tables;
              if (screensMap[sc.id].name !== sc.name) {
                screensMap[sc.id].name = sc.name;
              }
            }
          });
          return;
        } catch (e) {
          console.error("Lỗi parse LocalStorage, reset dữ liệu.", e);
        }
      }
      
      screensMap = {};
      INITIAL_SCREENS.forEach(sc => {
        screensMap[sc.id] = {
          id: sc.id,
          name: sc.name,
          eduCode: sc.eduCode,
          tables: sc.tables,
          description: '',
          status: 'Chưa xử lý'
        };
      });

      saveProgress();
    }

    function saveProgress(itemId) {
      localStorage.setItem(STORAGE_KEY + '_' + selectedModuleId, JSON.stringify(screensMap));
      updateProgressMetrics();
      
      // Sync single screen item to Firebase Firestore if enabled
      if (isFirebaseEnabled && firestoreDb) {
        const docId = `${selectedModuleId}_${itemId}`;
        const item = screensMap[itemId];
        firestoreDb.collection('screens').doc(docId).set({
          id: item.id,
          moduleId: selectedModuleId,
          name: item.name,
          eduCode: item.eduCode || '-',
          tables: item.tables || [],
          status: item.status || 'Chưa xử lý',
          description: item.description || '',
          jiraUrl: item.jiraUrl || '',
          actualUrl: item.actualUrl || '',
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true })
        .then(() => {
          console.log(`Cloud sync successful for screen ${itemId}`);
        })
        .catch(err => {
          console.error("Firestore update failed:", err);
        });
      }
    }

    // UPDATE METRICS
    function updateProgressMetrics() {
      const screensList = Object.values(screensMap);
      const total = screensList.length;
      let todo = 0, progress = 0, done = 0;
      
      screensList.forEach(s => {
        if (s.status === 'Chưa xử lý') todo++;
        else if (s.status === 'Đang xử lý') progress++;
        else if (s.status === 'Đã xử lý') done++;
      });
      
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      
      document.getElementById('global-progress-pct').innerText = pct + '%';
      document.getElementById('global-progress-bar').style.width = pct + '%';
      
      document.getElementById('stat-total').innerText = total;
      document.getElementById('stat-progress').innerText = progress;
      document.getElementById('stat-done').innerText = done;
      
      document.getElementById('chip-all-count').innerText = total;
      document.getElementById('chip-todo-count').innerText = todo;
      document.getElementById('chip-progress-count').innerText = progress;
      document.getElementById('chip-done-count').innerText = done;
    }

    // MATCH SEARCH AND FILTERS
    function isMatched(item) {
      if (!item) return false;
      if (activeFilter !== 'ALL' && item.status !== activeFilter) {
        return false;
      }
      
      if (searchQuery) {
        const q = searchQuery.toLowerCase().trim();
        const idMatch = item.id.toLowerCase().includes(q);
        const nameMatch = item.name.toLowerCase().includes(q);
        const eduMatch = item.eduCode.toLowerCase().includes(q);
        const tableMatch = item.tables.some(t => t.toLowerCase().includes(q));
        const descMatch = (item.description || '').toLowerCase().includes(q);
        
        return idMatch || nameMatch || eduMatch || tableMatch || descMatch;
      }
      
      return true;
    }

    }

        <select class="status-dropdown ${cls}" onchange="changeItemStatus('${itemId}', this.value)">

        </select>

      renderContent();
    });

    const htmlEl = document.documentElement;
    const themeBtn = document.getElementById('theme-btn');
    const darkIcon = themeBtn.querySelector('.dark-icon');
    const lightIcon = themeBtn.querySelector('.light-icon');

    function toggleTheme() {
      if (htmlEl.classList.contains('dark')) {
        htmlEl.classList.remove('dark');
        darkIcon.style.display = 'block';
        lightIcon.style.display = 'none';
        localStorage.setItem('menu_theme', 'light');
      } else {
        htmlEl.classList.add('dark');
        darkIcon.style.display = 'none';
        lightIcon.style.display = 'block';
        localStorage.setItem('menu_theme', 'dark');
      }
    }
    
    themeBtn.addEventListener('click', toggleTheme);

    // Initial theme load
    const savedTheme = localStorage.getItem('menu_theme');
    if (savedTheme === 'light') {
      htmlEl.classList.remove('dark');
      darkIcon.style.display = 'block';
      lightIcon.style.display = 'none';
    } else {
      htmlEl.classList.add('dark');

      lightIcon.style.display = 'block';

      const downloadAnchor = document.createElement('a');
      downloadAnchor.href = url;
      downloadAnchor.download = "chuong_trinh_dao_tao_tien_do.json";
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
      URL.revokeObjectURL(url);
    });

    document.getElementById('import-btn').addEventListener('click', () => {
      fileInput.click();
    });

      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const imported = JSON.parse(evt.target.result);
          if (typeof imported === 'object' && imported !== null) {
            const keys = Object.keys(imported);
            if (keys.length > 0 && imported[keys[0]].id) {
              screensMap = imported;
              saveProgress();
              renderContent();
              alert("Nhập tiến độ thành công!");
            } else {
              alert("Định dạng file JSON không hợp lệ.");
            }
          }
        } catch (err) {
          alert("Lỗi khi đọc file JSON: " + err.message);
        }
      };
      reader.readAsText(file);
    });

    function updateCloudStatus(status) {
      const badge = document.getElementById('cloud-status-badge');
      if (!badge) return;
      
      badge.className = `cloud-status-badge ${status}`;
      const dot = badge.querySelector('.status-dot');
      const text = badge.querySelector('.status-text');
      
      if (status === 'connected') {
        text.innerText = 'Cloud Syncing';
        badge.title = 'Đã kết nối Firebase Firestore. Tiến độ đồng bộ tự động.';
      } else if (status === 'connecting') {
        text.innerText = 'Connecting...';
        badge.title = 'Đang tải Firebase SDK và kết nối database...';
      } else if (status === 'error') {
        text.innerText = 'Cloud Error';
        badge.title = 'Lỗi kết nối Firebase database.';
      } else {
        text.innerText = 'Local Sync';
        badge.title = 'Chạy ở chế độ ngoại tuyến. Tiến độ lưu ở trình duyệt này.';
      }
    }

    function showToast(message, type = 'info') {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        container.className = 'toast-container';
        document.body.appendChild(container);
      }
      
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <svg class="icon-svg" style="width:14px;height:14px;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        <span>${message}</span>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(12px) scale(0.95)';
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 4000);
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function initFirebase(config) {
      try {
        await loadScript('https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js');
        
        firebase.initializeApp(config);
        firestoreDb = firebase.firestore();
        isFirebaseEnabled = true;
        
        updateCloudStatus('connected');
        showToast('Đồng bộ Cloud Sync đã sẵn sàng!');
        
        // Dynamically load modules & tables from Firestore first
        await loadModulesListFromFirestore();
        setupTablesListener();
        
        switchModule(selectedModuleId);
        checkAndInitializeFirestoreData();
        initializeDefaultTablesInFirestore();
      } catch (err) {
        console.error("Firebase init failed:", err);
        updateCloudStatus('error');
        showToast('Lỗi tải SDK. Chuyển sang lưu cục bộ.', 'error');
        switchModule(selectedModuleId);
      }
    }

    async function checkAndInitializeFirestoreData() {
      if (!firestoreDb) return;

        if (!doc.exists) {
          console.log("Initializing database with default training_program & admission modules...");

          batch.set(firestoreDb.collection('modules').doc('training_program'), { id: 'training_program', name: 'Chương trình Đào tạo', order: 1 });
          batch.set(firestoreDb.collection('modules').doc('admission'), { id: 'admission', name: 'Tuyển sinh (Mới)', order: 2 });
          
          // Seed static menu structures
          batch.set(firestoreDb.collection('menu_structures').doc('training_program'), {
            moduleId: 'training_program',
            structure: DEFAULT_STRUCTURES.training_program
          });
          batch.set(firestoreDb.collection('menu_structures').doc('admission'), {
            moduleId: 'admission',
            structure: DEFAULT_STRUCTURES.admission
          });

          Object.keys(DEFAULT_SCREENS_MAP).forEach(modId => {
            const screensOfMod = DEFAULT_SCREENS_MAP[modId];
            Object.keys(screensOfMod).forEach(scrId => {
              const scr = screensOfMod[scrId];
              const docId = `${modId}_${scrId}`;
              batch.set(firestoreDb.collection('screens').doc(docId), {
                id: scr.id,
                moduleId: modId,
                name: scr.name,
                eduCode: scr.eduCode || '-',
                tables: scr.tables || [],
                status: 'Chưa xử lý',
                description: '',
                jiraUrl: '',
                actualUrl: '',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
            });
          });
          
          await batch.commit();
          console.log("Successfully initialized default modules and screens in Cloud Firestore!");
        }
      } catch (err) {
        console.error("Error verifying/initializing Firestore collections:", err);
      }
    }

    function setupFirebaseListener(moduleId) {
      if (!firestoreDb) return;
      
      screensListenerUnsubscribe = firestoreDb.collection('screens')
        .where('moduleId', '==', moduleId)
        .onSnapshot(snapshot => {
          let changed = false;
          snapshot.forEach(doc => {
            const data = doc.data();
            const scrId = data.id;
            if (screensMap[scrId]) {
              if (screensMap[scrId].status !== data.status || 
                  screensMap[scrId].description !== data.description ||
                  screensMap[scrId].jiraUrl !== data.jiraUrl ||
                  screensMap[scrId].actualUrl !== data.actualUrl) {
                
                screensMap[scrId].status = data.status || 'Chưa xử lý';
                screensMap[scrId].description = data.description || '';
                screensMap[scrId].jiraUrl = data.jiraUrl || '';
                screensMap[scrId].actualUrl = data.actualUrl || '';
                changed = true;
              }
            } else {
              screensMap[scrId] = {
                id: data.id,
                name: data.name,
                eduCode: data.eduCode || '-',
                tables: data.tables || [],
                status: data.status || 'Chưa xử lý',
                description: data.description || '',
                jiraUrl: data.jiraUrl || '',
                actualUrl: data.actualUrl || ''
              };
              changed = true;
            }
          });
          
          if (changed) {
            localStorage.setItem(STORAGE_KEY + '_' + moduleId, JSON.stringify(screensMap));
            updateProgressMetrics();
            renderContent();
          }
        }, err => {
          console.error("Firestore screens list listen error:", err);
          showToast('Lỗi đồng bộ Firestore', 'error');
        });
    }

    function setupMenuStructureListener(moduleId) {
      if (menuStructureListenerUnsubscribe) {
        menuStructureListenerUnsubscribe();
        menuStructureListenerUnsubscribe = null;
      }
      if (!firestoreDb) return;
      
      menuStructureListenerUnsubscribe = firestoreDb.collection('menu_structures').doc(moduleId)
        .onSnapshot(doc => {
          if (doc.exists) {
            const data = doc.data();
            activeMenuStructure = data.structure || [];
            localStorage.setItem(STORAGE_KEY + '_structure_' + moduleId, JSON.stringify(activeMenuStructure));
            updateProgressMetrics();
            renderContent();
          }
        });
    }

    function setupTablesListener() {
      if (tablesListenerUnsubscribe) {
        tablesListenerUnsubscribe();
        tablesListenerUnsubscribe = null;
      }
      if (!firestoreDb) return;
      
      tablesListenerUnsubscribe = firestoreDb.collection('tables')
        .onSnapshot(snapshot => {
          const list = [];
          snapshot.forEach(doc => {
            const data = doc.data();
            list.push({
              id: data.tableId,
              title: data.tableName || data.tableId,
              group: data.group || 'general',
              x: data.x !== undefined ? data.x : 150,
              y: data.y !== undefined ? data.y : 150,
              columns: data.columns || [],
              relations: data.relations || []
            });
          });
          if (list.length > 0) {
            tables = list;
            localStorage.setItem(STORAGE_KEY + '_tables_schema', JSON.stringify(tables));
            renderContent();
          }
        });
    }

    window.addModule = function() {
      const id = document.getElementById('new-mod-id').value.trim();
      const name = document.getElementById('new-mod-name').value.trim();
      
      if (!id || !name) {
        alert("Vui lòng điền đầy đủ Mã ID và Tên phân hệ!");
        return;
      }
      if (!/^[a-z0-9_]+$/.test(id)) {
        alert("Mã phân hệ chỉ chứa chữ thường, số và gạch dưới (không chứa khoảng trắng hay ký tự đặc biệt)!");
        return;
      }
      if (MODULES_LIST.some(m => m.id === id)) {
        alert("Mã phân hệ này đã tồn tại!");
        return;
      }

      const newMod = { id, name, order: MODULES_LIST.length + 1 };
      MODULES_LIST.push(newMod);
      
      DEFAULT_STRUCTURES[id] = [];
      DEFAULT_SCREENS_MAP[id] = {};

      if (isFirebaseEnabled && firestoreDb) {
        firestoreDb.collection('modules').doc(id).set(newMod);
        firestoreDb.collection('menu_structures').doc(id).set({
          moduleId: id,
          structure: []
        });
      } else {
        localStorage.setItem(STORAGE_KEY + '_modules_list', JSON.stringify(MODULES_LIST));
      }

      repopulateModuleDropdown();
      switchModule(id);
      renderAdminTabContent();
      showToast(`Đã thêm phân hệ ${name}`);
    };

    window.renameModulePrompt = function(moduleId, oldName) {
      const newName = prompt(`Nhập tên mới cho phân hệ ${oldName}:`, oldName);
      if (newName && newName.trim() && newName !== oldName) {
        const mod = MODULES_LIST.find(m => m.id === moduleId);
        if (mod) {
          mod.name = newName.trim();
          if (isFirebaseEnabled && firestoreDb) {
            firestoreDb.collection('modules').doc(moduleId).update({
              name: newName.trim()
            });
          } else {
            localStorage.setItem(STORAGE_KEY + '_modules_list', JSON.stringify(MODULES_LIST));
          }
          repopulateModuleDropdown();
          renderAdminTabContent();
          showToast("Đã đổi tên phân hệ thành công!");
        }
      }
    };

    window.deleteModulePrompt = function(moduleId) {
      if (MODULES_LIST.length <= 1) {
        alert("Không thể xóa phân hệ duy nhất còn lại!");
        return;
      }
      
      // Warning prompt as requested by user
      if (confirm(`⚠️ CẢNH BÁO QUAN TRỌNG:\nXóa phân hệ này sẽ xóa vĩnh viễn toàn bộ menu cấu trúc và toàn bộ tiến độ xử lý của các màn hình thuộc phân hệ này.\nHành động này không thể hoàn tác!\n\nBạn có thực sự chắc chắn muốn tiếp tục không?`)) {
        MODULES_LIST = MODULES_LIST.filter(m => m.id !== moduleId);
        delete DEFAULT_STRUCTURES[moduleId];
        delete DEFAULT_SCREENS_MAP[moduleId];
        
        if (isFirebaseEnabled && firestoreDb) {
          firestoreDb.collection('modules').doc(moduleId).delete();
          firestoreDb.collection('menu_structures').doc(moduleId).delete();
          firestoreDb.collection('screens').where('moduleId', '==', moduleId).get().then(snap => {
            const batch = firestoreDb.batch();
            snap.forEach(doc => {
              batch.delete(doc.ref);
            });
            batch.commit();
          });
        } else {
          localStorage.setItem(STORAGE_KEY + '_modules_list', JSON.stringify(MODULES_LIST));
          localStorage.removeItem(STORAGE_KEY + '_' + moduleId);
          localStorage.removeItem(STORAGE_KEY + '_structure_' + moduleId);
        }

        repopulateModuleDropdown();
        switchModule(MODULES_LIST[0].id);
        renderAdminTabContent();
        showToast("Đã xóa phân hệ thành công!");
      }
    };

    window.addNewScreen = function() {
      const groupKey = document.getElementById('screen-group-select').value;
      const id = document.getElementById('new-scr-id').value.trim();
      const name = document.getElementById('new-scr-name').value.trim();
      const eduCode = document.getElementById('new-scr-educode').value.trim() || '-';
      
      if (!groupKey) {
        alert("Vui lòng chọn nhóm menu!");

      if (screensMap[id]) {

      const selectedTables = [];
      document.querySelectorAll('input[name="screen-tables"]:checked').forEach(cb => {
        selectedTables.push(cb.value);
      });

      };
      
      screensMap[id] = newScreen;

      const parts = groupKey.split('-');

      const gIdx = parseInt(parts[1]);
      activeMenuStructure[mIdx].items[gIdx].items.push({ id, name });

      saveMenuStructure();
      
      if (isFirebaseEnabled && firestoreDb) {
        const docId = `${selectedModuleId}_${id}`;

      }
      if (!/^[a-zA-Z0-9_]+$/.test(id)) {
        alert("Mã bảng chỉ chứa chữ, số và gạch dưới!");
        return;
      }
      if (tables.some(t => t.id === id)) {
        alert("Bảng này đã tồn tại!");
        return;
      }

      const newTable = {
        id: id,
        name: id,
        title: title,
        group: group,
        x: 150,
        y: 150,
        columns: [{ name: "Id", type: "int", key: "PK" }],
        relations: []
      };

      tables.push(newTable);

      saveTableSchemaToCloud(newTable);
      renderAdminTabContent();
      showToast(`Đã thêm bảng ${id}`);
    };

    window.deleteTablePrompt = function(tableId) {
      // Warnings before deleting as requested by user
      if (confirm(`⚠️ CẢNH BÁO QUAN TRỌNG:\nXóa bảng [${tableId}] sẽ:\n1. Gỡ liên kết bảng này khỏi tất cả các màn hình đang tham chiếu.\n2. Xóa bảng vĩnh viễn khỏi sơ đồ quan hệ cơ sở dữ liệu.\n\nBạn có chắc chắn muốn xóa bảng này không?`)) {
        tables = tables.filter(t => t.id !== tableId);

        // Scan and clean screen related tables
        Object.keys(screensMap).forEach(scrId => {
          if (screensMap[scrId].tables) {
            const beforeLen = screensMap[scrId].tables.length;
            screensMap[scrId].tables = screensMap[scrId].tables.filter(t => t !== tableId);
            if (screensMap[scrId].tables.length !== beforeLen) {
              saveProgress(scrId);
            }
          }
        });

        if (isFirebaseEnabled && firestoreDb) {
          firestoreDb.collection('tables').doc(tableId).delete();
        } else {
          localStorage.setItem(STORAGE_KEY + '_tables_schema', JSON.stringify(tables));
        }

        renderAdminTabContent();
        showToast(`Đã xóa bảng ${tableId} thành công!`);
      }
    };

    window.editTableColumnsPrompt = function(tableId) {
      activeEditTableId = tableId;
      const t = tables.find(tbl => tbl.id === tableId);
      if (!t) return;

      renderAdminTablesList(document.getElementById('admin-table-search')?.value?.trim()?.toLowerCase() || '');

      const detailPanel = document.getElementById('admin-table-details-panel');
      if (!detailPanel) return;

      const tablesSelectOptionsHtml = `<option value="">-- Chọn bảng đích --</option>` + tables.map(tbl => `
        <option value="${tbl.id}">${tbl.id}</option>
      `).join('');

      detailPanel.innerHTML = `
        <div style="border: 1px solid var(--card-border); padding:16px; border-radius:12px; background:var(--card-bg); display:flex; flex-direction:column; gap:16px;">
          <!-- Table Header Details -->
          <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--card-border); padding-bottom:12px;">
            <div>
              <span class="table-badge badge-${t.group}" style="font-size:9px; font-weight:700; text-transform:uppercase; padding:2px 6px; border-radius:4px;">${t.group}</span>
              <h3 style="font-family:monospace; font-size:16px; margin:4px 0 2px 0; color:var(--text-main);">${t.id}</h3>
              <p style="font-size:12px; color:var(--text-muted); margin:0;">${t.title}</p>
            </div>
            <div style="display:flex; gap:8px;">
              <button class="admin-btn secondary" style="padding:4px 10px; font-size:11px;" onclick="hideSchemaEditor()">Đóng</button>
              <button class="admin-btn danger" style="padding:4px 10px; font-size:11px;" onclick="deleteTablePrompt('${t.id}')">Xóa Bảng</button>
            </div>
          </div>

          <!-- 2 Column details layout -->
          <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:16px;">
            <!-- Column List section -->
            <div style="display:flex; flex-direction:column; gap:8px;">
              <h4 style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin:0 0 4px 0;">Cột dữ liệu (${t.columns.length})</h4>
              
              <div style="max-height: 240px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; padding-right:4px;">
                ${t.columns.map(col => {
                  const isPk = col.key === 'PK';
                  const isFk = col.key === 'FK';
                  const keyText = isPk ? '[PK]' : (isFk ? '[FK]' : '');
                  const keyColor = isPk ? '#ef4444' : (isFk ? '#3b82f6' : 'transparent');
                  
                  return `
                    <div style="display:flex; justify-content:space-between; align-items:center; font-size:11px; padding:6px 8px; background:rgba(0,0,0,0.02); border:1px solid var(--card-border); border-radius:6px;">
                      <div style="display:flex; align-items:center; gap:6px; flex:1; min-width:0;">
                        <span style="color:${keyColor}; font-weight:bold; font-family:monospace; font-size:9px; width:24px; flex-shrink:0;">${keyText}</span>
                        <span style="font-family:monospace; color:var(--text-main); font-weight:600; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;" title="${col.name}">${col.name}</span>
                        <span style="color:var(--text-muted); font-size:10px; font-family:monospace; flex-shrink:0;">(${col.type})</span>
                      </div>
                      <div style="display:flex; align-items:center; gap:8px;">
                        <label style="display:flex; align-items:center; gap:3px; font-size:10px; cursor:pointer;" title="Hiện cột trên diagram">
                          <input type="checkbox" ${col.visible !== false ? 'checked' : ''} onchange="toggleColumnVisibility('${t.id}', '${col.name}', this.checked)">
                          👁️
                        </label>
                        <button class="close-modal-btn" style="font-size:12px; color:#ef4444; width:16px; height:16px; margin:0;" onclick="deleteColumnFromTable('${col.name}')">&times;</button>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>

              <!-- Add Column form inline -->
              <div style="background:var(--item-hover); padding:10px; border-radius:8px; border:1px solid var(--card-border); margin-top:8px;">
                <h5 style="font-size:10px; font-weight:700; color:var(--text-muted); margin:0 0 6px 0; text-transform:uppercase;">Thêm Cột mới</h5>
                <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:6px; margin-bottom:6px;">
                  <input type="text" id="new-col-name" class="admin-input" style="padding:4px 6px; font-size:11px;" placeholder="Tên cột...">
                  <input type="text" id="new-col-type" class="admin-input" style="padding:4px 6px; font-size:11px;" placeholder="Kiểu (int)...">
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                  <label style="font-size:10px; color:var(--text-main); display:flex; align-items:center; gap:3px;">
                    <input type="checkbox" id="new-col-pk"> Khóa chính PK
                  </label>
                  <label style="font-size:10px; color:var(--text-main); display:flex; align-items:center; gap:3px;">
                    <input type="checkbox" id="new-col-fk"> Khóa ngoại FK
                  </label>
                </div>
                <button class="admin-btn secondary" style="width:100%; padding:4px; font-size:11px;" onclick="addColumnToTable()">Thêm Cột</button>
              </div>
            </div>

            <!-- Relationships & Add Relation -->
            <div style="display:flex; flex-direction:column; gap:8px;">
              <h4 style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin:0 0 4px 0;">Liên kết quan hệ (FK)</h4>
              
              <div style="max-height: 120px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; padding-right:4px;">
                ${t.relations.map((rel, rIdx) => `
                  <div style="display:flex; justify-content:space-between; align-items:center; font-size:11px; padding:6px; background:rgba(0,0,0,0.02); border:1px solid var(--card-border); border-radius:6px;">
                    <span style="font-family:monospace; color:var(--text-main); text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">
                      ${rel.fromCol} → <strong style="color:var(--accent-color);">${rel.toTable}</strong>(${rel.toCol})
                    </span>
                    <button class="close-modal-btn" style="font-size:12px; color:#ef4444; width:16px; height:16px; margin:0;" onclick="deleteRelationFromTable(${rIdx})">&times;</button>
                  </div>
                `).join('') || '<div style="font-size:10px; color:var(--text-muted); text-align:center; padding:8px;">Không có liên kết ngoại.</div>'}
              </div>

              <!-- Add Relation form inline -->
              <div style="background:var(--item-hover); padding:10px; border-radius:8px; border:1px solid var(--card-border); margin-top:8px;">
                <h5 style="font-size:10px; font-weight:700; color:var(--text-muted); margin:0 0 6px 0; text-transform:uppercase;">Thêm liên kết quan hệ</h5>
                <div style="display:flex; flex-direction:column; gap:6px; margin-bottom:6px;">
                  <select id="rel-target-table" class="admin-input" style="padding:4px; font-size:11px;">
                    ${tablesSelectOptionsHtml}
                  </select>
                  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px;">
                    <input type="text" id="rel-from-col" class="admin-input" style="padding:4px; font-size:11px;" placeholder="Cột nguồn (ID)...">
                    <input type="text" id="rel-to-col" class="admin-input" style="padding:4px; font-size:11px;" placeholder="Cột đích (Id)...">
                  </div>
                </div>
                <button class="admin-btn secondary" style="width:100%; padding:4px; font-size:11px;" onclick="addRelationToTable()">Thêm Liên Kết</button>
              </div>
            </div>
          </div>
        </div>
      `;
    };

    window.hideSchemaEditor = function() {
      activeEditTableId = null;
      renderAdminTablesList();
      const detailPanel = document.getElementById('admin-table-details-panel');
      if (detailPanel) {
        detailPanel.innerHTML = `
          <div style="display:flex; height:100%; justify-content:center; align-items:center; color:var(--text-muted); font-size:12px; border: 2px dashed var(--card-border); border-radius:12px; background:rgba(0,0,0,0.01);">
            👈 Chọn một bảng từ danh sách bên trái để xem cấu trúc và chỉnh sửa cột
          </div>
        `;
      }
    };

    window.addColumnToTable = function() {
      if (!activeEditTableId) return;
      const name = document.getElementById('new-col-name').value.trim();
      const type = document.getElementById('new-col-type').value.trim();
      const isPk = document.getElementById('new-col-pk').checked;
      const isFk = document.getElementById('new-col-fk').checked;

      if (!name || !type) {
        alert("Vui lòng điền tên cột và kiểu dữ liệu!");
        return;
      }

      const t = tables.find(tbl => tbl.id === activeEditTableId);
      if (!t) return;

      if (t.columns.some(col => col.name === name)) {
        alert("Cột này đã tồn tại!");
        return;
      }

      let key = "";
      if (isPk) key = "PK";
      else if (isFk) key = "FK";

      t.columns.push({ name, type, key });

      saveTableSchemaToCloud(t);
      editTableColumnsPrompt(activeEditTableId);
      showToast(`Đã thêm cột ${name}`);

      document.getElementById('new-col-name').value = '';
      document.getElementById('new-col-type').value = '';
      document.getElementById('new-col-pk').checked = false;
      document.getElementById('new-col-fk').checked = false;
    };

    window.deleteColumnFromTable = function(colName) {
      if (!activeEditTableId) return;
      const t = tables.find(tbl => tbl.id === activeEditTableId);
      if (!t) return;

      if (confirm(`Bạn có muốn xóa cột [${colName}] khỏi bảng [${activeEditTableId}] không?`)) {
        t.columns = t.columns.filter(col => col.name !== colName);
        saveTableSchemaToCloud(t);
        editTableColumnsPrompt(activeEditTableId);
        showToast("Đã xóa cột thành công.");
      }
    };

    window.addRelationToTable = function() {
      if (!activeEditTableId) return;
      const targetTable = document.getElementById('rel-target-table').value;
      const fromCol = document.getElementById('rel-from-col').value.trim();
      const toCol = document.getElementById('rel-to-col').value.trim();

      if (!targetTable || !fromCol || !toCol) {
        alert("Vui lòng chọn bảng đích và nhập cột!");
        return;
      }

      const t = tables.find(tbl => tbl.id === activeEditTableId);
      if (!t) return;

      t.relations.push({
        toTable: targetTable,
        fromCol: fromCol,
        toCol: toCol
      });

      saveTableSchemaToCloud(t);
      editTableColumnsPrompt(activeEditTableId);
      showToast("Đã thêm liên kết quan hệ.");

      document.getElementById('rel-from-col').value = '';
      document.getElementById('rel-to-col').value = '';
    };

    window.deleteRelationFromTable = function(index) {
      if (!activeEditTableId) return;
      const t = tables.find(tbl => tbl.id === activeEditTableId);
      if (!t) return;

      if (confirm("Bạn có chắc chắn muốn xóa liên kết này không?")) {
        t.relations.splice(index, 1);
        saveTableSchemaToCloud(t);
        editTableColumnsPrompt(activeEditTableId);
        showToast("Đã gỡ liên kết thành công.");
      }
    };

    function saveTableSchemaToCloud(t) {
      if (isFirebaseEnabled && firestoreDb) {
        firestoreDb.collection('tables').doc(t.id).set({
          tableId: t.id,
          tableName: t.title,
          group: t.group,
          x: t.x !== undefined ? t.x : 150,
          y: t.y !== undefined ? t.y : 150,
          columns: t.columns || [],
          relations: t.relations || []
        });
      } else {
        localStorage.setItem(STORAGE_KEY + '_tables_schema', JSON.stringify(tables));
      }
      renderContent();
    }

    window.syncSqlSchemaFromJSON = async function() {
      if (confirm("Bạn có chắc chắn muốn đồng bộ toàn bộ 37 bảng từ file SQL Schema cấu trúc mới lên Firebase Firestore? Hành động này sẽ ghi đè các bảng trùng tên.")) {
        try {
          if (typeof SQL_TABLES_SCHEMA === 'undefined' || !Array.isArray(SQL_TABLES_SCHEMA) || SQL_TABLES_SCHEMA.length === 0) {
            alert("Không thể tìm thấy cấu trúc SQL Schema (hoặc dữ liệu không hợp lệ).");
            return;
          }

          const sqlTables = SQL_TABLES_SCHEMA;

          if (isFirebaseEnabled && firestoreDb) {
            showToast("Đang đồng bộ lên Firebase...");
            const batch = firestoreDb.batch();
            
            sqlTables.forEach(t => {
              const docRef = firestoreDb.collection('tables').doc(t.id);
              batch.set(docRef, {
                tableId: t.id,
                tableName: t.title,
                group: t.group,
                x: t.x || Math.floor(Math.random() * 800) + 100,
                y: t.y || Math.floor(Math.random() * 500) + 100,
                columns: t.columns || [],
                relations: t.relations || []
              });
            });
            
            await batch.commit();
            showToast(`Đã đồng bộ thành công ${sqlTables.length} bảng lên Cloud!`);
          } else {
            // Local fallback
            tables = sqlTables;
            localStorage.setItem(STORAGE_KEY + '_tables_schema', JSON.stringify(tables));
            showToast(`Đã đồng bộ cục bộ ${sqlTables.length} bảng thành công!`);
          }
          
          renderContent();
          renderAdminTabContent();
        } catch (err) {
          console.error("Lỗi khi đồng bộ SQL Schema:", err);
          alert("Lỗi đồng bộ: " + err.message);
        }
      }
    };

    window.exportTableSchemaJSON = function() {
      try {
        const blob = new Blob([JSON.stringify(tables, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const downloadAnchor = document.createElement('a');
        downloadAnchor.href = url;
        downloadAnchor.download = "database_tables_schema_backup.json";
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        URL.revokeObjectURL(url);
        showToast("Đã xuất file cấu trúc bảng (Schema JSON) thành công!");
      } catch (err) {
        console.error("Lỗi xuất file Schema:", err);
        alert("Lỗi khi xuất file: " + err.message);
      }
    };

    window.triggerImportTableSchema = function() {
      document.getElementById('import-schema-file-input').click();
    };

    window.importTableSchemaJSON = function(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!Array.isArray(parsed) || parsed.length === 0) {
            throw new Error("Dữ liệu cấu trúc bảng phải là một mảng JSON hợp lệ.");
          }

          const isValid = parsed.every(t => t.id && Array.isArray(t.columns));
          if (!isValid) {
            throw new Error("Định dạng file Schema JSON không đúng (mỗi bảng phải có trường id và mảng columns).");
          }

          if (confirm(`Bạn có chắc chắn muốn nhập ${parsed.length} bảng từ file JSON không? Việc này sẽ ghi đè và đồng bộ toàn bộ cấu trúc lên Firestore (nếu có kết nối Cloud).`)) {
            tables = parsed;
            
            if (isFirebaseEnabled && firestoreDb) {
              showToast("Đang đồng bộ Schema mới lên Cloud...");
              const batch = firestoreDb.batch();
              
              tables.forEach(t => {
                const docRef = firestoreDb.collection('tables').doc(t.id);
                batch.set(docRef, {
                  tableId: t.id,
                  tableName: t.title || t.id,
                  group: t.group || 'general',
                  x: t.x !== undefined ? t.x : 150,
                  y: t.y !== undefined ? t.y : 150,
                  columns: t.columns || [],
                  relations: t.relations || []
                });
              });
              
              await batch.commit();
              showToast("Đã đồng bộ thành công cấu trúc Schema mới lên Cloud!");
            } else {
              localStorage.setItem(STORAGE_KEY + '_tables_schema', JSON.stringify(tables));
              showToast("Đã cập nhật cấu trúc Schema cục bộ thành công!");
            }

            renderContent();
            renderAdminTabContent();
          }
        } catch (err) {
          console.error("Lỗi đọc file Schema:", err);
          alert("Lỗi khi đọc file cấu trúc: " + err.message);
        } finally {
          event.target.value = '';
        }
      };
      reader.readAsText(file);
    };

    // INITIALIZATION
    window.onload = () => {
      fetchFirebaseConfig();
    };
  </script>

  <!-- ADMIN SETTINGS MODAL -->
  <div class="admin-modal-overlay" id="admin-modal">
    <div class="admin-modal-card">
      <div class="admin-modal-header">
        <h3>⚙️ Cấu hình Hệ thống & Quản trị</h3>
        <button class="close-modal-btn" onclick="closeAdminSettings()">&times;</button>
      </div>
      <div class="admin-modal-body">
        <div class="admin-sidebar">
          <button class="admin-tab-btn active" id="tab-btn-modules" onclick="switchAdminTab('modules')">Quản lý Phân hệ</button>
          <button class="admin-tab-btn" id="tab-btn-screens" onclick="switchAdminTab('screens')">Quản lý Màn hình</button>
          <button class="admin-tab-btn" id="tab-btn-database" onclick="switchAdminTab('database')">Quản lý Table DB</button>
        </div>
        <div class="admin-content-area" id="admin-tab-content">
          <!-- Loaded dynamically -->
        </div>
      </div>
    </div>
  </div>
</body>
</html>
